<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBudget - Mise à jour</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .app-icon {
            width: 120px;
            height: 120px;
            border-radius: 28px;
            object-fit: cover;
            margin-bottom: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 15px 50px rgba(74, 222, 128, 0.3);
            }
        }

        h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .version {
            color: #4ade80;
            font-size: 14px;
            font-weight: 600;
            background: rgba(74, 222, 128, 0.15);
            padding: 6px 16px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 24px;
            animation: fadeIn 0.8s ease-out 0.4s both;
        }

        .status {
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid rgba(74, 222, 128, 0.3);
            color: #4ade80;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 14px;
            animation: fadeIn 0.8s ease-out 0.6s both;
        }

        .status-icon {
            font-size: 24px;
            margin-bottom: 8px;
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            color: #0a0a0a;
            text-decoration: none;
            padding: 18px 36px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(74, 222, 128, 0.3);
            animation: fadeIn 0.8s ease-out 0.8s both;
            position: relative;
            overflow: hidden;
        }

        .download-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .download-btn:hover::before {
            left: 100%;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(74, 222, 128, 0.4);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        .download-icon {
            font-size: 22px;
        }

        .info {
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            animation: fadeIn 0.8s ease-out 1s both;
        }

        .info p {
            margin-bottom: 4px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 32px 24px;
            }

            .app-icon {
                width: 100px;
                height: 100px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="container">
        <img src="Icon.jpeg" alt="SmartBudget" class="app-icon">
        
        <h1>SmartBudget</h1>
        
        <span class="version">Version 1.2.0</span>
        
        <div class="status">
            <div class="status-icon">🎉</div>
            <strong>Nouvelle version disponible !</strong>
            <p>Téléchargez la dernière mise à jour</p>
        </div>
        
        <a href="app-release.apk" class="download-btn" download>
            <span class="download-icon">📥</span>
            Télécharger la mise à jour
        </a>
        
        <div class="info">
            <p>Taille: <span id="file-size">--</span></p>
            <p>Cliquez pour télécharger le fichier APK</p>
        </div>
    </div>

    <script>
        // Canvas Animation - Particules flottantes
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let particles = [];
        const particleCount = 50;
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        class Particle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.2;
                this.color = Math.random() > 0.5 ? '#4ade80' : '#22c55e';
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        // Créer les particules
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }
        
        // Lignes de connexion
        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 150) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = '#4ade80';
                        ctx.globalAlpha = (1 - distance / 150) * 0.15;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                    }
                }
            }
        }
        
        // Animation principale
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Dessiner les connexions
            drawConnections();
            
            // Mettre à jour et dessiner les particules
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // Afficher la taille du fichier
        fetch('app-debug.apk')
            .then(response => response.blob())
            .then(blob => {
                const size = blob.size;
                const mb = (size / (1024 * 1024)).toFixed(2);
                document.getElementById('file-size').textContent = mb + ' MB';
            })
            .catch(() => {
                document.getElementById('file-size').textContent = '--';
            });
    </script>
</body>
</html>
